name: "Run TODO to Issue"
on:
  push:
    branches:
      - main
jobs:
  build:
    if: github.repository == 'clement-group/nmr-processing'
    runs-on: "ubuntu-latest"
    permissions:
      issues: write
    steps:
      - uses: "actions/checkout@v6"
      - name: "TODO to Issue"
        uses: "alstr/todo-to-issue-action@v5"
        with:
          CLOSE_ISSUES: "true"
